  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;image-tool-root&quot; style=&quot;--font-size-base:14px;font-size:var(--font-size-base);line-height:1.5;color:var(--foreground);background:transparent;font-family:system-ui,-apple-system,sans-serif&quot;&gt;
&lt;style&gt;
  #image-tool-root{--radius:8px;--space-sm:6px;--space-md:12px;--space-lg:20px}
  #image-tool-root .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px var(--space-lg);text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:var(--space-lg)}
  #image-tool-root .upload-zone:hover,#image-tool-root .upload-zone.dragover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 6%,transparent)}
  #image-tool-root .upload-zone.has-image{padding:var(--space-md);border-style:solid;border-color:var(--border)}
  #image-tool-root .upload-icon{margin-bottom:var(--space-sm);color:var(--muted-foreground)}
  #image-tool-root .upload-hint{color:var(--muted-foreground);font-size:13px;margin-top:4px}
  #image-tool-root .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);margin-bottom:var(--space-lg)}
  #image-tool-root .preview-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  #image-tool-root .preview-header{padding:var(--space-sm) var(--space-md);font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  #image-tool-root .preview-body{display:flex;align-items:center;justify-content:center;min-height:200px;background:color-mix(in srgb,var(--muted) 30%,transparent);position:relative}
  #image-tool-root .preview-body img{max-width:100%;max-height:360px;object-fit:contain;display:block}
  #image-tool-root .preview-placeholder{color:var(--muted-foreground);font-size:13px;text-align:center;padding:var(--space-lg)}
  #image-tool-root .size-info{font-size:12px;color:var(--muted-foreground)}
  #image-tool-root .controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md) var(--space-lg)}
  @media(max-width:600px){#image-tool-root .preview-grid{grid-template-columns:1fr}#image-tool-root .controls-grid{grid-template-columns:1fr}}
  #image-tool-root .control-group{display:flex;flex-direction:column;gap:4px}
  #image-tool-root .control-group .form-label{font-size:13px;font-weight:500;margin:0;display:flex;align-items:center;gap:var(--space-sm);justify-content:space-between}
  #image-tool-root .control-group .form-label .val{font-weight:400;color:var(--muted-foreground)}
  #image-tool-root .watermark-section{margin-top:var(--space-sm);padding:var(--space-md);background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:none;grid-column:1/-1}
  #image-tool-root .watermark-section.visible{display:block}
  #image-tool-root .watermark-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-md)}
  @media(max-width:600px){#image-tool-root .watermark-grid{grid-template-columns:1fr}}
  #image-tool-root .badge-dims{font-size:11px;color:var(--muted-foreground)}
  #image-tool-root .download-bar{margin-top:var(--space-lg);display:flex;gap:var(--space-md);align-items:center;flex-wrap:wrap}
&lt;/style&gt;
&lt;!-- Upload Zone --&gt;
&lt;div class=&quot;upload-zone&quot; id=&quot;uploadZone&quot; role=&quot;button&quot; tabindex=&quot;0&quot; aria-label=&quot;拖拽或点击上传图片&quot;&gt;
  &lt;div id=&quot;uploadPlaceholder&quot;&gt;
    &lt;div class=&quot;upload-icon&quot;&gt;&lt;i data-lucide=&quot;image-plus&quot; style=&quot;width:40px;height:40px;stroke-width:1.5&quot;&gt;&lt;/i&gt;&lt;/div&gt;
    &lt;div style=&quot;font-weight:500;margin-bottom:4px&quot;&gt;拖拽图片到此处，或点击选择&lt;/div&gt;
    &lt;div class=&quot;upload-hint&quot;&gt;支持 JPG、PNG、WebP、BMP 格式&lt;/div&gt;
  &lt;/div&gt;
  &lt;div id=&quot;uploadFileInfo&quot; style=&quot;display:none;display:flex;align-items:center;gap:var(--space-md)&quot;&gt;
    &lt;i data-lucide=&quot;file-image&quot; style=&quot;width:20px;height:20px;flex-shrink:0&quot;&gt;&lt;/i&gt;
    &lt;div style=&quot;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap&quot;&gt;
      &lt;div id=&quot;fileName&quot; style=&quot;font-weight:500;font-size:13px&quot;&gt;&lt;/div&gt;
      &lt;div id=&quot;fileDims&quot; class=&quot;badge-dims&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;changeFileBtn&quot; data-tooltip=&quot;更换图片&quot;&gt;&lt;i data-lucide=&quot;refresh-cw&quot; style=&quot;width:14px;height:14px&quot;&gt;&lt;/i&gt;&lt;/button&gt;
  &lt;/div&gt;
  &lt;input type=&quot;file&quot; id=&quot;fileInput&quot; accept=&quot;image/jpeg,image/png,image/webp,image/bmp&quot; style=&quot;display:none&quot;&gt;
&lt;/div&gt;
&lt;!-- Preview --&gt;
&lt;div class=&quot;preview-grid&quot; id=&quot;previewGrid&quot; style=&quot;display:none&quot;&gt;
  &lt;div class=&quot;preview-card&quot;&gt;
    &lt;div class=&quot;preview-header&quot;&gt;
      &lt;span&gt;原始&lt;/span&gt;
      &lt;span class=&quot;size-info&quot; id=&quot;origSize&quot;&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;preview-body&quot; id=&quot;origPreviewBody&quot;&gt;
      &lt;div class=&quot;preview-placeholder&quot;&gt;暂无图片&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;preview-card&quot;&gt;
    &lt;div class=&quot;preview-header&quot;&gt;
      &lt;span&gt;处理后&lt;/span&gt;
      &lt;span class=&quot;size-info&quot; id=&quot;procSize&quot;&gt;&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;preview-body&quot; id=&quot;procPreviewBody&quot;&gt;
      &lt;div class=&quot;preview-placeholder&quot;&gt;调整参数后自动更新&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;
&lt;!-- Controls --&gt;
&lt;div id=&quot;controlsArea&quot; style=&quot;display:none&quot;&gt;
  &lt;div class=&quot;controls-grid&quot;&gt;
    &lt;div class=&quot;control-group&quot;&gt;
      &lt;label class=&quot;form-label&quot; for=&quot;qualityRange&quot;&gt;压缩质量 &lt;span class=&quot;val&quot; id=&quot;qualityVal&quot;&gt;80%&lt;/span&gt;&lt;/label&gt;
      &lt;input type=&quot;range&quot; class=&quot;form-range&quot; id=&quot;qualityRange&quot; min=&quot;1&quot; max=&quot;100&quot; value=&quot;80&quot;&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
      &lt;label class=&quot;form-label&quot; for=&quot;formatSelect&quot;&gt;输出格式&lt;/label&gt;
      &lt;select class=&quot;form-select&quot; id=&quot;formatSelect&quot;&gt;
        &lt;option value=&quot;image/jpeg&quot;&gt;JPEG&lt;/option&gt;
        &lt;option value=&quot;image/png&quot;&gt;PNG&lt;/option&gt;
        &lt;option value=&quot;image/webp&quot; selected&gt;WebP&lt;/option&gt;
        &lt;option value=&quot;image/bmp&quot;&gt;BMP&lt;/option&gt;
      &lt;/select&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
      &lt;div class=&quot;form-check form-switch&quot; style=&quot;padding-top:8px&quot;&gt;
        &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; id=&quot;watermarkToggle&quot; role=&quot;switch&quot;&gt;
        &lt;label class=&quot;form-check-label&quot; for=&quot;watermarkToggle&quot; style=&quot;font-weight:500&quot;&gt;水印&lt;/label&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
      &lt;div class=&quot;form-check form-switch&quot; style=&quot;padding-top:8px&quot;&gt;
        &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; id=&quot;resizeToggle&quot; role=&quot;switch&quot;&gt;
        &lt;label class=&quot;form-check-label&quot; for=&quot;resizeToggle&quot; style=&quot;font-weight:500&quot;&gt;缩放&lt;/label&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;watermark-section&quot; id=&quot;watermarkSection&quot;&gt;
    &lt;div class=&quot;watermark-grid&quot;&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkText&quot;&gt;文字&lt;/label&gt;
        &lt;input type=&quot;text&quot; class=&quot;form-control&quot; id=&quot;watermarkText&quot; value=&quot;水印示例&quot; placeholder=&quot;输入水印文字&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkPos&quot;&gt;位置&lt;/label&gt;
        &lt;select class=&quot;form-select&quot; id=&quot;watermarkPos&quot;&gt;
          &lt;option value=&quot;nw&quot;&gt;左上&lt;/option&gt;
          &lt;option value=&quot;n&quot;&gt;中上&lt;/option&gt;
          &lt;option value=&quot;ne&quot;&gt;右上&lt;/option&gt;
          &lt;option value=&quot;w&quot;&gt;左中&lt;/option&gt;
          &lt;option value=&quot;c&quot;&gt;居中&lt;/option&gt;
          &lt;option value=&quot;e&quot;&gt;右中&lt;/option&gt;
          &lt;option value=&quot;sw&quot; selected&gt;左下&lt;/option&gt;
          &lt;option value=&quot;s&quot;&gt;中下&lt;/option&gt;
          &lt;option value=&quot;se&quot;&gt;右下&lt;/option&gt;
        &lt;/select&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkSize&quot;&gt;字号 &lt;span class=&quot;val&quot; id=&quot;watermarkSizeVal&quot;&gt;32px&lt;/span&gt;&lt;/label&gt;
        &lt;input type=&quot;range&quot; class=&quot;form-range&quot; id=&quot;watermarkSize&quot; min=&quot;12&quot; max=&quot;120&quot; value=&quot;32&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkOpacity&quot;&gt;透明度 &lt;span class=&quot;val&quot; id=&quot;watermarkOpacityVal&quot;&gt;50%&lt;/span&gt;&lt;/label&gt;
        &lt;input type=&quot;range&quot; class=&quot;form-range&quot; id=&quot;watermarkOpacity&quot; min=&quot;5&quot; max=&quot;100&quot; value=&quot;50&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkColor&quot;&gt;颜色&lt;/label&gt;
        &lt;input type=&quot;color&quot; class=&quot;form-control form-control-color&quot; id=&quot;watermarkColor&quot; value=&quot;#ffffff&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;watermarkPadding&quot;&gt;边距 &lt;span class=&quot;val&quot; id=&quot;watermarkPaddingVal&quot;&gt;16px&lt;/span&gt;&lt;/label&gt;
        &lt;input type=&quot;range&quot; class=&quot;form-range&quot; id=&quot;watermarkPadding&quot; min=&quot;4&quot; max=&quot;80&quot; value=&quot;16&quot;&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;watermark-section&quot; id=&quot;resizeSection&quot;&gt;
    &lt;div class=&quot;watermark-grid&quot;&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;resizeWidth&quot;&gt;宽度 (px) &lt;span class=&quot;val&quot; id=&quot;resizeWidthVal&quot;&gt;—&lt;/span&gt;&lt;/label&gt;
        &lt;input type=&quot;number&quot; class=&quot;form-control&quot; id=&quot;resizeWidth&quot; min=&quot;1&quot; placeholder=&quot;自动&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;resizeHeight&quot;&gt;高度 (px) &lt;span class=&quot;val&quot; id=&quot;resizeHeightVal&quot;&gt;—&lt;/span&gt;&lt;/label&gt;
        &lt;input type=&quot;number&quot; class=&quot;form-control&quot; id=&quot;resizeHeight&quot; min=&quot;1&quot; placeholder=&quot;自动&quot;&gt;
      &lt;/div&gt;
      &lt;div class=&quot;control-group&quot; style=&quot;justify-content:center&quot;&gt;
        &lt;div class=&quot;form-check&quot;&gt;
          &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; id=&quot;resizeKeepRatio&quot; checked&gt;
          &lt;label class=&quot;form-check-label&quot; for=&quot;resizeKeepRatio&quot;&gt;保持比例&lt;/label&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;download-bar&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;downloadBtn&quot; disabled&gt;
      &lt;i data-lucide=&quot;download&quot; style=&quot;width:14px;height:14px&quot;&gt;&lt;/i&gt; 下载处理后的图片
    &lt;/button&gt;
    &lt;span class=&quot;size-info&quot; id=&quot;savingsInfo&quot;&gt;&lt;/span&gt;
  &lt;/div&gt;
&lt;/div&gt;
&lt;script&gt;
(function(){
  var root = document.getElementById(&#x27;image-tool-root&#x27;);
  var $ = function(s){return root.querySelector(s)};
  var $$ = function(s){return root.querySelectorAll(s)};
  var uploadZone = $(&#x27;#uploadZone&#x27;);
  var fileInput = $(&#x27;#fileInput&#x27;);
  var uploadPlaceholder = $(&#x27;#uploadPlaceholder&#x27;);
  var uploadFileInfo = $(&#x27;#uploadFileInfo&#x27;);
  var fileName = $(&#x27;#fileName&#x27;);
  var fileDims = $(&#x27;#fileDims&#x27;);
  var changeFileBtn = $(&#x27;#changeFileBtn&#x27;);
  var previewGrid = $(&#x27;#previewGrid&#x27;);
  var origPreviewBody = $(&#x27;#origPreviewBody&#x27;);
  var procPreviewBody = $(&#x27;#procPreviewBody&#x27;);
  var origSize = $(&#x27;#origSize&#x27;);
  var procSize = $(&#x27;#procSize&#x27;);
  var controlsArea = $(&#x27;#controlsArea&#x27;);
  var qualityRange = $(&#x27;#qualityRange&#x27;);
  var qualityVal = $(&#x27;#qualityVal&#x27;);
  var formatSelect = $(&#x27;#formatSelect&#x27;);
  var watermarkToggle = $(&#x27;#watermarkToggle&#x27;);
  var watermarkSection = $(&#x27;#watermarkSection&#x27;);
  var watermarkText = $(&#x27;#watermarkText&#x27;);
  var watermarkPos = $(&#x27;#watermarkPos&#x27;);
  var watermarkSize = $(&#x27;#watermarkSize&#x27;);
  var watermarkSizeVal = $(&#x27;#watermarkSizeVal&#x27;);
  var watermarkOpacity = $(&#x27;#watermarkOpacity&#x27;);
  var watermarkOpacityVal = $(&#x27;#watermarkOpacityVal&#x27;);
  var watermarkColor = $(&#x27;#watermarkColor&#x27;);
  var watermarkPadding = $(&#x27;#watermarkPadding&#x27;);
  var watermarkPaddingVal = $(&#x27;#watermarkPaddingVal&#x27;);
  var resizeToggle = $(&#x27;#resizeToggle&#x27;);
  var resizeSection = $(&#x27;#resizeSection&#x27;);
  var resizeWidth = $(&#x27;#resizeWidth&#x27;);
  var resizeHeight = $(&#x27;#resizeHeight&#x27;);
  var resizeWidthVal = $(&#x27;#resizeWidthVal&#x27;);
  var resizeHeightVal = $(&#x27;#resizeHeightVal&#x27;);
  var resizeKeepRatio = $(&#x27;#resizeKeepRatio&#x27;);
  var downloadBtn = $(&#x27;#downloadBtn&#x27;);
  var savingsInfo = $(&#x27;#savingsInfo&#x27;);
  var originalImage = null;
  var processedBlob = null;
  var originalFileSize = 0;
  var originalWidth = 0;
  var originalHeight = 0;
  var processingTimer = null;
  function handleFile(f){
    if(!f||!f.type.startsWith(&#x27;image/&#x27;)) return;
    originalFileSize = f.size;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        originalImage = img;
        originalWidth = img.naturalWidth;
        originalHeight = img.naturalHeight;
        uploadPlaceholder.style.display = &#x27;none&#x27;;
        uploadFileInfo.style.display = &#x27;flex&#x27;;
        fileName.textContent = f.name;
        fileDims.textContent = img.naturalWidth+&#x27; x &#x27;+img.naturalHeight;
        uploadZone.classList.add(&#x27;has-image&#x27;);
        previewGrid.style.display = &#x27;&#x27;;
        controlsArea.style.display = &#x27;&#x27;;
        showOriginalPreview(img);
        resizeWidth.value = img.naturalWidth;
        resizeHeight.value = img.naturalHeight;
        resizeWidthVal.textContent = img.naturalWidth;
        resizeHeightVal.textContent = img.naturalHeight;
        scheduleProcess();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  }
  function showOriginalPreview(img){
    origPreviewBody.innerHTML = &#x27;&#x27;;
    var clone = img.cloneNode();
    clone.style.cssText = &#x27;max-width:100%;max-height:360px;object-fit:contain;display:block&#x27;;
    origPreviewBody.appendChild(clone);
    origSize.textContent = formatSize(originalFileSize);
  }
  uploadZone.addEventListener(&#x27;click&#x27;,function(){fileInput.click()});
  uploadZone.addEventListener(&#x27;dragover&#x27;,function(e){e.preventDefault();uploadZone.classList.add(&#x27;dragover&#x27;)});
  uploadZone.addEventListener(&#x27;dragleave&#x27;,function(){uploadZone.classList.remove(&#x27;dragover&#x27;)});
  uploadZone.addEventListener(&#x27;drop&#x27;,function(e){e.preventDefault();uploadZone.classList.remove(&#x27;dragover&#x27;);if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
  fileInput.addEventListener(&#x27;change&#x27;,function(){if(fileInput.files.length)handleFile(fileInput.files[0])});
  changeFileBtn.addEventListener(&#x27;click&#x27;,function(e){e.stopPropagation();fileInput.click()});
  qualityRange.addEventListener(&#x27;input&#x27;,function(){qualityVal.textContent = qualityRange.value+&#x27;%&#x27;;scheduleProcess()});
  formatSelect.addEventListener(&#x27;change&#x27;,scheduleProcess);
  watermarkToggle.addEventListener(&#x27;change&#x27;,function(){watermarkSection.classList.toggle(&#x27;visible&#x27;,watermarkToggle.checked);scheduleProcess()});
  watermarkText.addEventListener(&#x27;input&#x27;,scheduleProcess);
  watermarkPos.addEventListener(&#x27;change&#x27;,scheduleProcess);
  watermarkSize.addEventListener(&#x27;input&#x27;,function(){watermarkSizeVal.textContent=watermarkSize.value+&#x27;px&#x27;;scheduleProcess()});
  watermarkOpacity.addEventListener(&#x27;input&#x27;,function(){watermarkOpacityVal.textContent=watermarkOpacity.value+&#x27;%&#x27;;scheduleProcess()});
  watermarkColor.addEventListener(&#x27;input&#x27;,scheduleProcess);
  watermarkPadding.addEventListener(&#x27;input&#x27;,function(){watermarkPaddingVal.textContent=watermarkPadding.value+&#x27;px&#x27;;scheduleProcess()});
  resizeToggle.addEventListener(&#x27;change&#x27;,function(){resizeSection.classList.toggle(&#x27;visible&#x27;,resizeToggle.checked);scheduleProcess()});
  resizeWidth.addEventListener(&#x27;input&#x27;,function(){
    resizeWidthVal.textContent = resizeWidth.value||&#x27;—&#x27;;
    if(resizeKeepRatio.checked&amp;&amp;originalWidth){var r=originalHeight/originalWidth;var w=parseInt(resizeWidth.value);if(w){resizeHeight.value=Math.round(w*r);resizeHeightVal.textContent=resizeHeight.value}}
    scheduleProcess()
  });
  resizeHeight.addEventListener(&#x27;input&#x27;,function(){
    resizeHeightVal.textContent = resizeHeight.value||&#x27;—&#x27;;
    if(resizeKeepRatio.checked&amp;&amp;originalHeight){var r=originalWidth/originalHeight;var h=parseInt(resizeHeight.value);if(h){resizeWidth.value=Math.round(h*r);resizeWidthVal.textContent=resizeWidth.value}}
    scheduleProcess()
  });
  resizeKeepRatio.addEventListener(&#x27;change&#x27;,scheduleProcess);
  function scheduleProcess(){
    if(!originalImage) return;
    clearTimeout(processingTimer);
    processingTimer = setTimeout(processImage,150);
  }
  function processImage(){
    if(!originalImage) return;
    var quality = parseInt(qualityRange.value)/100;
    var mimeType = formatSelect.value;
    var addWatermark = watermarkToggle.checked;
    var doResize = resizeToggle.checked;
    var dstW = originalWidth;
    var dstH = originalHeight;
    if(doResize){
      var rw = parseInt(resizeWidth.value);
      var rh = parseInt(resizeHeight.value);
      if(rw&gt;0&amp;&amp;rh&gt;0){dstW=rw;dstH=rh}
      else if(rw&gt;0){dstW=rw;dstH=Math.round(rw*originalHeight/originalWidth)}
      else if(rh&gt;0){dstH=rh;dstW=Math.round(rh*originalWidth/originalHeight)}
    }
    var canvas = document.createElement(&#x27;canvas&#x27;);
    canvas.width = dstW;
    canvas.height = dstH;
    var ctx = canvas.getContext(&#x27;2d&#x27;);
    ctx.drawImage(originalImage,0,0,dstW,dstH);
    if(addWatermark){
      var text = watermarkText.value||&#x27;水印&#x27;;
      var fontSize = parseInt(watermarkSize.value);
      var opacity = parseInt(watermarkOpacity.value)/100;
      var color = watermarkColor.value;
      var padding = parseInt(watermarkPadding.value);
      var pos = watermarkPos.value;
      ctx.save();

      ctx.font = &#x27;bold &#x27;+fontSize+&#x27;px system-ui,-apple-system,sans-serif&#x27;;

      var tw = metrics.width;
      var th = fontSize*1.2;
      var x,y,align,baseline;
      if(pos===&#x27;nw&#x27;||pos===&#x27;w&#x27;||pos===&#x27;sw&#x27;){x=padding;align=&#x27;left&#x27;}
      else if(pos===&#x27;ne&#x27;||pos===&#x27;e&#x27;||pos===&#x27;se&#x27;){x=dstW-padding;align=&#x27;right&#x27;}
      else{x=dstW/2;align=&#x27;center&#x27;}
      if(pos===&#x27;nw&#x27;||pos===&#x27;n&#x27;||pos===&#x27;ne&#x27;){y=padding+fontSize;baseline=&#x27;top&#x27;}
      else if(pos===&#x27;sw&#x27;||pos===&#x27;s&#x27;||pos===&#x27;se&#x27;){y=dstH-padding;baseline=&#x27;bottom&#x27;}

      ctx.textBaseline = baseline;
      ctx.fillText(text,x,y);
      ctx.restore();

      updateProcessedPreview(blob);
      updateDownloadBtn(blob);
      var saved = originalFileSize - blob.size;
      var pct = originalFileSize&gt;0?Math.round((1-blob.size/originalFileSize)*100):0;
      if(saved&gt;0)savingsInfo.textContent=&#x27;缩小了 &#x27;+formatSize(saved)+&#x27; (&#x27;+pct+&#x27;%)&#x27;;
      else if(saved&lt;0)savingsInfo.textContent=&#x27;增大了 &#x27;+formatSize(-saved)+&#x27; (&#x27;+(-pct)+&#x27;%)&#x27;;
      else savingsInfo.textContent=&#x27;大小未变&#x27;;
    },mimeType,quality);
  }
  function updateProcessedPreview(blob){
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function(){
      procPreviewBody.innerHTML = &#x27;&#x27;;
      img.style.cssText = &#x27;max-width:100%;max-height:360px;object-fit:contain;display:block&#x27;;
      procPreviewBody.appendChild(img);
      procSize.textContent = formatSize(blob.size);

  function updateDownloadBtn(blob){

  function formatSize(bytes){
    if(bytes&lt;1024)return bytes+&#x27; B&#x27;;
    if(bytes&lt;1048576)return (bytes/1024).toFixed(1)+&#x27; KB&#x27;;
    return (bytes/1048576).toFixed(1)+&#x27; MB&#x27;;
  }

&lt;script&gt;

    window.FloatingUIDOM;

    window.crypto?.randomUUID?.() ?? Date.now().toString(36)

  const skipDelay = 300;

  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;

    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;

    })
      .then(({ x, y }) =&gt; {

  const openTooltip = (trigger) =&gt; {

    floating.style.visibility = &quot;hidden&quot;;

      getContent(trigger).length === 0 ||

    }

    pendingTrigger = trigger;
    const delay =
